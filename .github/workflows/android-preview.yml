name: Aura Android Preview Engine

on:
  workflow_dispatch: # Isse aap mobile se ek click mein server chalu kar sakte hain

jobs:
  run-cloud-phone:
    runs-on: macos-13 # Android Emulator macOS par bina kisi error ke 10s guna zyada fast chalta hai

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 1. Java aur Android SDK Tools Ready Karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 2. Cloud par Asli Android Emulator Launch Karna
    - name: Run Android Cloud Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        force-avd-creation: false
        emulator-options: -no-window -gpu off -no-audio -no-boot-anim
        script: echo "Android Emulator is Booted and Ready!"

    # 3. Stream Server Install Karna (Jo video stream banayega)
    - name: Install Stream Tools & Start Server
      run: |
        # Node.js ki madad se websockify aur localtunnel tools install karna
        npm install -g localtunnel websockify
        
        echo "=================================================="
        echo "SERVER STARTED! APNA LIVE LINK NICHE DEKHEIN:"
        echo "=================================================="
        
        # Localtunnel chalu karna jo aapko link dega
        lt --port 5555
