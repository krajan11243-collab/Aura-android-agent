name: Aura Full Android Real-Time Preview Engine

on:
  workflow_dispatch:

jobs:
  run-live-android-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v4

    - name: Initialize Node Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Linux Graphics Display & VNC Server setup bina kisi path issue ke
    - name: Setup Headless GUI Desktop Server
      run: |
        sudo apt-get update
        sudo apt-get install -y x11vnc xvfb fluxbox
        
        # Virtual Framebuffer screen ready karna (Resolution 1080x1920)
        Xvfb :1 -screen 0 1080x1920x24 &
        export DISPLAY=:1
        fluxbox &
        
        # Asli VNC screen stream port 5900 par map karna
        x11vnc -display :1 -nopw -listen localhost -xkb -forever &

    # Bina websockify folder error ke, direct port 5900 ko tunnel karna
    - name: Launch Interactive Web Stream Router
      run: |
        npm install -g localtunnel
        
        echo "=================================================="
        echo "REAL-TIME PORTAL CREATED SUCCESSFUL!"
        echo "APNA LIVE INTERACTIVE LINK NICHE DEKHEIN:"
        echo "=================================================="
        
        # Direct local VNC display handler ko internet link par map karna
        lt --port 5900
