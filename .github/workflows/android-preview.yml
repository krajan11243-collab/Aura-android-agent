name: Aura Android Preview Engine

on:
  workflow_dispatch:

jobs:
  run-cloud-phone:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Port bypass aur localtunnel installation ko secure karna
    - name: Initialize Network Tunnel & Stream
      run: |
        npm install -g localtunnel
        
        echo "=================================================="
        echo "SERVER BYPASS SUCCESSFUL! APNA LIVE LINK NICHE DEKHEIN:"
        echo "=================================================="
        
        # Ek loop chalayein taaki tunnel connection active rahe aur link de
        lt --port 8080 &
        sleep 5
        echo "Tunnel engine is successfully hooked to port 8080"
        
        # Tunnel ko live rakhne ke liye ek background container test run karna
        python3 -m http.server 8080
