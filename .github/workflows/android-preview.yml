name: Aura Full Android Real-Time Preview Engine

on:
  workflow_dispatch:

jobs:
  run-live-android-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v4

    - name: Initialize JDK 17 & Node Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Linux Graphics Display Server ready karna bina kisi android file crash ke
    - name: Setup Headless GUI Desktop Server
      run: |
        sudo apt-get update
        sudo apt-get install -y x11vnc xvfb fluxbox websockify
        
        # Background Display Framebuffer active karna (Resolution 1080x1920)
        Xvfb :1 -screen 0 1080x1920x24 &
        export DISPLAY=:1
        fluxbox &
        
        # Screen mirror engine start karna bina password lock ke
        x11vnc -display :1 -nopw -listen localhost -xkb -forever &

    # Instant Tunnel Generator tool run karna
    - name: Launch Interactive Web Stream Router
      run: |
        npm install -g localtunnel
        
        echo "=================================================="
        echo "REAL-TIME PORTAL CREATED SUCCESSFUL!"
        echo "APNA LIVE INTERACTIVE LINK NICHE DEKHEIN:"
        echo "=================================================="
        
        # Port 6080 par dynamic live display streams bind karna
        websockify --web=/usr/share/novnc 6080 localhost:5900 &
        sleep 5
        lt --port 6080
