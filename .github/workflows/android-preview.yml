name: Aura Android Preview Engine

on:
  workflow_dispatch:

jobs:
  run-cloud-phone:
    runs-on: ubuntu-latest # Ab ye turant 10 second mein start ho jayega!

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Linux par Android Emulator chalane ke liye Hardware Acceleration (KVM) chalu karna
    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules && sudo udevadm trigger

    - name: Run Android Cloud Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        force-avd-creation: false
        emulator-options: -no-window -gpu off -no-audio -no-boot-anim
        script: echo "Android Emulator is Booted on Linux!"

    - name: Install Stream Tools & Start Server
      run: |
        npm install -g localtunnel
        echo "=================================================="
        echo "SERVER STARTED! APNA LIVE LINK NICHE DEKHEIN:"
        echo "=================================================="
        lt --port 5555
